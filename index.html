<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bike Day Tracker</title>
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BikeTracker">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { color: #1e40af; border-color: #1e40af; }
        .tab-inactive { color: #6b7280; border-color: transparent; }
        .fade-in { animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .location-btn { transition: all 0.15s ease; }
        .location-btn:active { transform: scale(0.95); }
        .cal-day { min-height: 48px; }
        .modal-backdrop { background: rgba(0,0,0,0.4); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col max-w-lg mx-auto">
    <!-- Header -->
    <header class="bg-blue-800 text-white px-4 py-3 flex items-center justify-between shadow-md sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/>
                <path d="M15 6l-4 8h6l-3 3M5.5 17.5L9 9l3 8"/>
            </svg>
            <h1 class="text-lg font-bold">Bike Day Tracker</h1>
        </div>
        <button id="btnSettings" class="p-2 hover:bg-blue-700 rounded-lg transition" aria-label="Settings">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
        </button>
    </header>

    <!-- Main Content Area -->
    <main id="mainContent" class="flex-1 overflow-y-auto pb-20">
        <!-- Today View -->
        <div id="viewToday" class="p-4 fade-in"></div>
        <!-- Calendar View -->
        <div id="viewCalendar" class="p-4 fade-in hidden"></div>
        <!-- Summary View -->
        <div id="viewSummary" class="p-4 fade-in hidden"></div>
    </main>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-30 max-w-lg mx-auto">
        <div class="flex">
            <button class="tab-btn flex-1 flex flex-col items-center py-2 border-t-2 tab-active" data-tab="today">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span class="text-xs mt-0.5 font-medium">Today</span>
            </button>
            <button class="tab-btn flex-1 flex flex-col items-center py-2 border-t-2 tab-inactive" data-tab="calendar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                <span class="text-xs mt-0.5 font-medium">Calendar</span>
            </button>
            <button class="tab-btn flex-1 flex flex-col items-center py-2 border-t-2 tab-inactive" data-tab="summary">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                </svg>
                <span class="text-xs mt-0.5 font-medium">Summary</span>
            </button>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div id="modalSettings" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0" id="settingsBackdrop"></div>
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-2xl shadow-2xl max-h-[85vh] flex flex-col max-w-lg mx-auto animate-slide-up">
            <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800">Manage Locations</h2>
                <button id="btnCloseSettings" class="p-1 hover:bg-gray-100 rounded-lg">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="locationsList"></div>
            <div class="p-4 border-t border-gray-200">
                <h3 class="text-sm font-semibold text-gray-600 mb-2" id="formTitle">Add Location</h3>
                <div class="flex gap-2 items-end">
                    <div class="flex-1">
                        <input type="text" id="locName" placeholder="Location name" maxlength="50"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <input type="number" id="locDistance" placeholder="km" min="0" step="0.1"
                            class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <input type="color" id="locColor" value="#3b82f6"
                            class="w-10 h-10 rounded-lg border border-gray-300 cursor-pointer p-0.5">
                    </div>
                    <button id="btnSaveLocation" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                        Add
                    </button>
                </div>
                <input type="hidden" id="locEditId" value="">
            </div>
        </div>
    </div>

    <!-- Day Edit Modal -->
    <div id="modalDayEdit" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0" id="dayEditBackdrop"></div>
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-2xl shadow-2xl max-w-lg mx-auto">
            <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-lg font-bold text-gray-800" id="dayEditTitle">Edit Day</h2>
                <button id="btnCloseDayEdit" class="p-1 hover:bg-gray-100 rounded-lg">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-4" id="dayEditContent"></div>
        </div>
    </div>

    <script>
    // ==================== IndexedDB Layer ====================
    const DB_NAME = 'BikeDayTracker';
    const DB_VERSION = 1;
    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            if (db) return resolve(db);
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (e) => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains('locations')) {
                    d.createObjectStore('locations', { keyPath: 'id', autoIncrement: true });
                }
                if (!d.objectStoreNames.contains('entries')) {
                    d.createObjectStore('entries', { keyPath: 'date' });
                }
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(db); };
            request.onerror = (e) => reject(e.target.error);
        });
    }

    function dbTx(storeName, mode = 'readonly') {
        const tx = db.transaction(storeName, mode);
        return tx.objectStore(storeName);
    }

    function dbGetAll(storeName) {
        return new Promise((resolve, reject) => {
            const req = dbTx(storeName).getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    function dbGet(storeName, key) {
        return new Promise((resolve, reject) => {
            const req = dbTx(storeName).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    function dbPut(storeName, value) {
        return new Promise((resolve, reject) => {
            const req = dbTx(storeName, 'readwrite').put(value);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    function dbDelete(storeName, key) {
        return new Promise((resolve, reject) => {
            const req = dbTx(storeName, 'readwrite').delete(key);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    }

    async function getLocations() {
        return dbGetAll('locations');
    }

    async function saveLocation(loc) {
        return dbPut('locations', loc);
    }

    async function deleteLocation(id) {
        return dbDelete('locations', id);
    }

    async function getEntry(date) {
        return dbGet('entries', date);
    }

    async function saveEntry(date, locationIds) {
        if (locationIds.length === 0) {
            return dbDelete('entries', date);
        }
        return dbPut('entries', { date, locationIds });
    }

    async function getEntriesForMonth(year, month) {
        const all = await dbGetAll('entries');
        const prefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        return all.filter(e => e.date.startsWith(prefix));
    }

    // ==================== Utility ====================
    function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function today() { return formatDate(new Date()); }
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function parseDate(str) {
        const [y, m, d] = str.split('-').map(Number);
        return new Date(y, m - 1, d);
    }

    function formatDateNice(str) {
        const d = parseDate(str);
        return `${DAYS_FULL[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
    }

    function contrastColor(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return (r*299 + g*587 + b*114) / 1000 > 128 ? '#1f2937' : '#ffffff';
    }

    // ==================== State ====================
    let currentTab = 'today';
    let calYear, calMonth;
    let summaryYear, summaryMonth;
    const now = new Date();
    calYear = summaryYear = now.getFullYear();
    calMonth = summaryMonth = now.getMonth();
    let editingLocationId = null;
    let todayViewDate = today();

    // ==================== Tab Navigation ====================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.toggle('tab-active', b.dataset.tab === tab);
            b.classList.toggle('tab-inactive', b.dataset.tab !== tab);
        });
        document.getElementById('viewToday').classList.toggle('hidden', tab !== 'today');
        document.getElementById('viewCalendar').classList.toggle('hidden', tab !== 'calendar');
        document.getElementById('viewSummary').classList.toggle('hidden', tab !== 'summary');
        if (tab === 'today') renderToday();
        else if (tab === 'calendar') renderCalendar();
        else if (tab === 'summary') renderSummary();
    }

    // ==================== Today View ====================
    async function renderToday() {
        const container = document.getElementById('viewToday');
        const locations = await getLocations();
        const dateStr = todayViewDate;
        const entry = await getEntry(dateStr) || { date: dateStr, locationIds: [] };
        const d = parseDate(dateStr);
        const dayName = DAYS_FULL[d.getDay()];
        const isToday = dateStr === today();
        const isFuture = dateStr > today();

        if (locations.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12">
                    <div class="text-6xl mb-4">🚲</div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">Welcome!</h2>
                    <p class="text-gray-500 mb-6">Add your office locations to start tracking bike days.</p>
                    <button onclick="openSettings()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-blue-700 transition">
                        Add Locations
                    </button>
                </div>`;
            return;
        }

        const subtitle = isToday ? 'Where did you cycle today?' : (isFuture ? '' : 'Where did you cycle this day?');
        const todayBtnHtml = isToday ? '' : `<button id="btnGoToday" class="mt-1 text-xs text-blue-600 hover:text-blue-800 font-medium transition">Go to today</button>`;

        container.innerHTML = `
            <div class="flex items-center justify-between mb-6">
                <button id="todayPrev" class="p-2 hover:bg-gray-200 rounded-lg transition">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div class="text-center">
                    <p class="text-sm text-gray-500 font-medium">${dayName}</p>
                    <h2 class="text-2xl font-bold text-gray-800">${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</h2>
                    ${subtitle ? `<p class="text-sm text-gray-400 mt-1">${subtitle}</p>` : ''}
                    ${todayBtnHtml}
                </div>
                <button id="todayNext" class="p-2 hover:bg-gray-200 rounded-lg transition">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
            <div class="space-y-3" id="todayToggles"></div>
        `;

        document.getElementById('todayPrev').addEventListener('click', () => {
            const prev = parseDate(todayViewDate);
            prev.setDate(prev.getDate() - 1);
            todayViewDate = formatDate(prev);
            renderToday();
        });
        document.getElementById('todayNext').addEventListener('click', () => {
            const next = parseDate(todayViewDate);
            next.setDate(next.getDate() + 1);
            todayViewDate = formatDate(next);
            renderToday();
        });
        const goTodayBtn = document.getElementById('btnGoToday');
        if (goTodayBtn) {
            goTodayBtn.addEventListener('click', () => {
                todayViewDate = today();
                renderToday();
            });
        }

        const toggles = document.getElementById('todayToggles');
        locations.forEach(loc => {
            const active = entry.locationIds.includes(loc.id);
            toggles.appendChild(createToggleButton(loc, active, dateStr));
        });
    }

    function createToggleButton(loc, active, dateStr) {
        const btn = document.createElement('button');
        btn.className = `location-btn w-full flex items-center gap-3 p-4 rounded-xl border-2 transition ${
            active
                ? 'shadow-md'
                : 'bg-white border-gray-200 hover:border-gray-300'
        }`;
        if (active) {
            btn.style.borderColor = loc.color;
            btn.style.backgroundColor = loc.color + '15';
        }
        const distText = loc.distance ? `<span class="text-xs text-gray-400">${loc.distance} km</span>` : '';
        btn.innerHTML = `
            <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 text-lg font-bold transition"
                style="background:${active ? loc.color : '#e5e7eb'};color:${active ? contrastColor(loc.color) : '#9ca3af'}">
                ${active ? '✓' : loc.name.charAt(0).toUpperCase()}
            </div>
            <div class="flex-1 text-left">
                <div class="font-semibold ${active ? 'text-gray-800' : 'text-gray-600'}">${escapeHtml(loc.name)}</div>
                ${distText}
            </div>
            <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center transition"
                style="border-color:${loc.color};background:${active ? loc.color : 'transparent'}">
                ${active ? '<svg class="w-3 h-3" fill="'+contrastColor(loc.color)+'" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>' : ''}
            </div>
        `;
        btn.addEventListener('click', async () => {
            const entry = await getEntry(dateStr) || { date: dateStr, locationIds: [] };
            const idx = entry.locationIds.indexOf(loc.id);
            if (idx >= 0) entry.locationIds.splice(idx, 1);
            else entry.locationIds.push(loc.id);
            await saveEntry(dateStr, entry.locationIds);
            // Re-render based on context
            if (document.getElementById('modalDayEdit').classList.contains('hidden')) {
                renderToday();
            } else {
                renderDayEditContent(dateStr);
            }
        });
        return btn;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ==================== Calendar View ====================
    async function renderCalendar() {
        const container = document.getElementById('viewCalendar');
        const entries = await getEntriesForMonth(calYear, calMonth);
        const locations = await getLocations();
        const locMap = Object.fromEntries(locations.map(l => [l.id, l]));
        const entryMap = Object.fromEntries(entries.map(e => [e.date, e]));

        const firstDay = new Date(calYear, calMonth, 1);
        let startDay = firstDay.getDay() - 1; // Monday = 0
        if (startDay < 0) startDay = 6; // Sunday becomes 6
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

        let html = `
            <div class="flex items-center justify-between mb-4">
                <button id="calPrev" class="p-2 hover:bg-gray-200 rounded-lg transition">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="text-lg font-bold text-gray-800">${MONTHS[calMonth]} ${calYear}</h2>
                <button id="calNext" class="p-2 hover:bg-gray-200 rounded-lg transition">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
            <div class="grid grid-cols-7 gap-1 mb-1">
                ${DAYS_SHORT.map(d => `<div class="text-center text-xs font-semibold text-gray-400 py-1">${d}</div>`).join('')}
            </div>
            <div class="grid grid-cols-7 gap-1">
        `;

        // Empty cells before first day
        for (let i = 0; i < startDay; i++) {
            html += `<div class="cal-day"></div>`;
        }

        const todayStr = today();
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = formatDate(new Date(calYear, calMonth, d));
            const entry = entryMap[dateStr];
            const isToday = dateStr === todayStr;
            const dots = entry ? entry.locationIds.map(id => {
                const loc = locMap[id];
                return loc ? `<div class="w-2 h-2 rounded-full" style="background:${loc.color}"></div>` : '';
            }).join('') : '';

            html += `
                <button class="cal-day rounded-lg p-1 flex flex-col items-center justify-start hover:bg-gray-100 transition relative ${isToday ? 'bg-blue-50 ring-2 ring-blue-400' : ''}"
                    data-date="${dateStr}">
                    <span class="text-sm font-medium ${isToday ? 'text-blue-700 font-bold' : 'text-gray-700'}">${d}</span>
                    <div class="flex gap-0.5 mt-0.5 flex-wrap justify-center">${dots}</div>
                </button>
            `;
        }

        html += `</div>`;
        container.innerHTML = html;

        document.getElementById('calPrev').addEventListener('click', () => {
            calMonth--;
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCalendar();
        });
        document.getElementById('calNext').addEventListener('click', () => {
            calMonth++;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            renderCalendar();
        });

        container.querySelectorAll('[data-date]').forEach(btn => {
            btn.addEventListener('click', () => openDayEdit(btn.dataset.date));
        });
    }

    // ==================== Day Edit Modal ====================
    async function openDayEdit(dateStr) {
        document.getElementById('modalDayEdit').classList.remove('hidden');
        document.getElementById('dayEditTitle').textContent = formatDateNice(dateStr);
        await renderDayEditContent(dateStr);
    }

    async function renderDayEditContent(dateStr) {
        const container = document.getElementById('dayEditContent');
        const locations = await getLocations();
        const entry = await getEntry(dateStr) || { date: dateStr, locationIds: [] };

        container.innerHTML = '';
        if (locations.length === 0) {
            container.innerHTML = '<p class="text-gray-500 text-center py-4">No locations configured. Add locations in settings.</p>';
            return;
        }
        const wrapper = document.createElement('div');
        wrapper.className = 'space-y-3';
        locations.forEach(loc => {
            const active = entry.locationIds.includes(loc.id);
            wrapper.appendChild(createToggleButton(loc, active, dateStr));
        });
        container.appendChild(wrapper);
    }

    function closeDayEdit() {
        document.getElementById('modalDayEdit').classList.add('hidden');
        if (currentTab === 'calendar') renderCalendar();
        if (currentTab === 'today') renderToday();
    }

    document.getElementById('btnCloseDayEdit').addEventListener('click', closeDayEdit);
    document.getElementById('dayEditBackdrop').addEventListener('click', closeDayEdit);

    // ==================== Summary View ====================
    async function renderSummary() {
        const container = document.getElementById('viewSummary');
        const entries = await getEntriesForMonth(summaryYear, summaryMonth);
        const locations = await getLocations();
        const locMap = Object.fromEntries(locations.map(l => [l.id, l]));

        entries.sort((a, b) => a.date.localeCompare(b.date));

        // Count per location
        const counts = {};
        let totalDistance = 0;
        entries.forEach(e => {
            e.locationIds.forEach(id => {
                counts[id] = (counts[id] || 0) + 1;
                if (locMap[id] && locMap[id].distance) totalDistance += locMap[id].distance;
            });
        });

        let html = `
            <div class="flex items-center justify-between mb-4">
                <button id="sumPrev" class="p-2 hover:bg-gray-200 rounded-lg transition">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="text-lg font-bold text-gray-800">${MONTHS[summaryMonth]} ${summaryYear}</h2>
                <button id="sumNext" class="p-2 hover:bg-gray-200 rounded-lg transition">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        `;

        if (entries.length === 0) {
            html += `
                <div class="text-center py-12">
                    <div class="text-5xl mb-3">📋</div>
                    <p class="text-gray-500">No bike days recorded for this month.</p>
                </div>`;
        } else {
            // Summary cards
            html += `<div class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-sm font-semibold text-gray-600">Overview</h3>
                    <span class="text-sm text-gray-500">${entries.length} day${entries.length !== 1 ? 's' : ''} · ${totalDistance.toFixed(1)} km total</span>
                </div>
                <div class="space-y-2">
                    ${Object.entries(counts).map(([id, count]) => {
                        const loc = locMap[id];
                        if (!loc) return '';
                        const dist = loc.distance ? ` · ${(loc.distance * count).toFixed(1)} km` : '';
                        return `<div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full flex-shrink-0" style="background:${loc.color}"></div>
                            <span class="text-sm text-gray-700 flex-1">${escapeHtml(loc.name)}</span>
                            <span class="text-sm font-medium text-gray-500">${count} day${count !== 1 ? 's' : ''}${dist}</span>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;

            // Chronological list
            html += `<div class="space-y-2">`;
            entries.forEach(e => {
                const badges = e.locationIds.map(id => {
                    const loc = locMap[id];
                    if (!loc) return '';
                    return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium" style="background:${loc.color};color:${contrastColor(loc.color)}">${escapeHtml(loc.name)}</span>`;
                }).join(' ');
                html += `
                    <div class="bg-white rounded-lg border border-gray-200 px-3 py-2 flex items-center justify-between">
                        <span class="text-sm font-medium text-gray-700">${formatDateNice(e.date)}</span>
                        <div class="flex gap-1 flex-wrap justify-end">${badges}</div>
                    </div>`;
            });
            html += `</div>`;

            // Copy button
            html += `
                <button id="btnCopySummary" class="mt-4 w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-xl font-medium transition flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                    </svg>
                    Copy Summary to Clipboard
                </button>`;
        }

        container.innerHTML = html;

        document.getElementById('sumPrev').addEventListener('click', () => {
            summaryMonth--;
            if (summaryMonth < 0) { summaryMonth = 11; summaryYear--; }
            renderSummary();
        });
        document.getElementById('sumNext').addEventListener('click', () => {
            summaryMonth++;
            if (summaryMonth > 11) { summaryMonth = 0; summaryYear++; }
            renderSummary();
        });

        const copyBtn = document.getElementById('btnCopySummary');
        if (copyBtn) {
            copyBtn.addEventListener('click', async () => {
                let text = `Bike Days — ${MONTHS[summaryMonth]} ${summaryYear}\n\n`;
                entries.forEach(e => {
                    const names = e.locationIds.map(id => locMap[id]?.name || '?').join(', ');
                    text += `${formatDateNice(e.date)}: ${names}\n`;
                });
                text += `\nTotal: ${entries.length} day${entries.length !== 1 ? 's' : ''}, ${totalDistance.toFixed(1)} km\n`;
                Object.entries(counts).forEach(([id, count]) => {
                    const loc = locMap[id];
                    if (loc) {
                        const dist = loc.distance ? ` (${(loc.distance * count).toFixed(1)} km)` : '';
                        text += `  ${loc.name}: ${count} day${count !== 1 ? 's' : ''}${dist}\n`;
                    }
                });
                try {
                    await navigator.clipboard.writeText(text);
                    copyBtn.innerHTML = `<svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> Copied!`;
                    copyBtn.classList.add('bg-green-100', 'text-green-700');
                    setTimeout(() => {
                        copyBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Summary to Clipboard`;
                        copyBtn.classList.remove('bg-green-100', 'text-green-700');
                    }, 2000);
                } catch(e) { /* clipboard API might fail in insecure contexts */ }
            });
        }
    }

    // ==================== Settings Modal ====================
    function openSettings() {
        document.getElementById('modalSettings').classList.remove('hidden');
        editingLocationId = null;
        resetLocationForm();
        renderLocationsList();
    }

    function closeSettings() {
        document.getElementById('modalSettings').classList.add('hidden');
        editingLocationId = null;
        resetLocationForm();
        // Refresh current view
        if (currentTab === 'today') renderToday();
        else if (currentTab === 'calendar') renderCalendar();
        else if (currentTab === 'summary') renderSummary();
    }

    function resetLocationForm() {
        document.getElementById('locName').value = '';
        document.getElementById('locDistance').value = '';
        document.getElementById('locColor').value = '#3b82f6';
        document.getElementById('locEditId').value = '';
        document.getElementById('formTitle').textContent = 'Add Location';
        document.getElementById('btnSaveLocation').textContent = 'Add';
        editingLocationId = null;
    }

    async function renderLocationsList() {
        const list = document.getElementById('locationsList');
        const locations = await getLocations();

        if (locations.length === 0) {
            list.innerHTML = '<p class="text-gray-400 text-center text-sm py-4">No locations yet. Add your first one below!</p>';
            return;
        }

        list.innerHTML = locations.map(loc => {
            const distText = loc.distance ? `${loc.distance} km` : '';
            return `
            <div class="flex items-center gap-3 bg-gray-50 rounded-lg p-3">
                <div class="w-8 h-8 rounded-full flex-shrink-0" style="background:${loc.color}"></div>
                <div class="flex-1 min-w-0">
                    <div class="font-medium text-gray-800 truncate">${escapeHtml(loc.name)}</div>
                    ${distText ? `<div class="text-xs text-gray-400">${distText}</div>` : ''}
                </div>
                <button class="p-1.5 hover:bg-gray-200 rounded-lg transition" onclick="editLocation(${loc.id})" aria-label="Edit ${escapeHtml(loc.name)}">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </button>
                <button class="p-1.5 hover:bg-red-100 rounded-lg transition" onclick="confirmDeleteLocation(${loc.id}, '${escapeHtml(loc.name)}')" aria-label="Delete ${escapeHtml(loc.name)}">
                    <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </div>`;
        }).join('');
    }

    window.editLocation = async function(id) {
        const loc = await dbGet('locations', id);
        if (!loc) return;
        editingLocationId = id;
        document.getElementById('locName').value = loc.name;
        document.getElementById('locDistance').value = loc.distance || '';
        document.getElementById('locColor').value = loc.color;
        document.getElementById('locEditId').value = id;
        document.getElementById('formTitle').textContent = 'Edit Location';
        document.getElementById('btnSaveLocation').textContent = 'Save';
        document.getElementById('locName').focus();
    };

    window.confirmDeleteLocation = async function(id, name) {
        if (confirm(`Delete "${name}"? This won't remove past entries.`)) {
            await deleteLocation(id);
            renderLocationsList();
        }
    };

    document.getElementById('btnSaveLocation').addEventListener('click', async () => {
        const name = document.getElementById('locName').value.trim();
        const color = document.getElementById('locColor').value;
        const distVal = document.getElementById('locDistance').value;
        const distance = distVal ? parseFloat(distVal) : 0;

        if (!name) { document.getElementById('locName').focus(); return; }

        if (editingLocationId) {
            const loc = await dbGet('locations', editingLocationId);
            if (loc) {
                loc.name = name;
                loc.color = color;
                loc.distance = distance;
                await saveLocation(loc);
            }
        } else {
            await saveLocation({ name, color, distance, createdAt: new Date().toISOString() });
        }

        resetLocationForm();
        renderLocationsList();
    });

    document.getElementById('btnSettings').addEventListener('click', openSettings);
    document.getElementById('btnCloseSettings').addEventListener('click', closeSettings);
    document.getElementById('settingsBackdrop').addEventListener('click', closeSettings);

    // ==================== PWA: Service Worker & Manifest ====================
    // Inline manifest
    const manifest = {
        name: 'Bike Day Tracker',
        short_name: 'BikeTracker',
        description: 'Track your bike commute days',
        start_url: location.href,
        display: 'standalone',
        background_color: '#f9fafb',
        theme_color: '#1e40af',
        icons: [{
            src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#1e40af"/><text x="50" y="68" font-size="50" text-anchor="middle" fill="white">🚲</text></svg>'),
            sizes: '512x512',
            type: 'image/svg+xml',
            purpose: 'any maskable'
        }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const manifestURL = URL.createObjectURL(manifestBlob);
    const linkEl = document.createElement('link');
    linkEl.rel = 'manifest';
    linkEl.href = manifestURL;
    document.head.appendChild(linkEl);

    // Inline service worker
    const swCode = `
        const CACHE = 'biketracker-v1';
        self.addEventListener('install', e => {
            self.skipWaiting();
        });
        self.addEventListener('activate', e => {
            e.waitUntil(clients.claim());
        });
        self.addEventListener('fetch', e => {
            if (e.request.method !== 'GET') return;
            if (e.request.url.includes('cdn.tailwindcss.com') || e.request.url.includes('fonts.googleapis.com') || e.request.url.includes('fonts.gstatic.com')) {
                e.respondWith(
                    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                        const clone = res.clone();
                        caches.open(CACHE).then(c => c.put(e.request, clone));
                        return res;
                    }))
                );
            }
        });
    `;
    if ('serviceWorker' in navigator) {
        const swBlob = new Blob([swCode], { type: 'application/javascript' });
        const swURL = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swURL, { scope: '/' }).catch(() => {});
    }

    // ==================== Init ====================
    (async () => {
        await openDB();
        renderToday();
    })();
    </script>
</body>
